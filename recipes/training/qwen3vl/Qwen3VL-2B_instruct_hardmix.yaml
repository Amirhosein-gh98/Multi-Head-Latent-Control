# recipes/training/qwen3vl/Qwen3VL-4B_thinking_mixed60k_unsloth_strong_single_regression.yaml

# ---- Model ----
model_name_or_path: Qwen/Qwen3-VL-2B-Instruct
trust_remote_code: true
attn_implementation: flash_attention_3

# ---- Unsloth ----
prefer_unsloth_mirror: true
load_in_4bit: false
load_in_8bit: false
use_gradient_checkpointing: unsloth
dtype: bf16

# ---- Data ----
dataset_path: data/train/Qwen3VL/Qwen3_VL_2B_Instruct_hard_Mixed_Sources_120k/verified/
aux_label_column: correctness_score
# subset_name: null

# ---- Output ----
output_dir: trained_models/Qwen3VL-2B_instruct_120K
seed: 42

# ---- Training ----
per_device_batch_size: 1
grad_accum_steps: 16
num_epochs: 2
lr: 1.0e-4
weight_decay: 0.0
max_grad_norm: 1.0
warmup_ratio: 0.03
min_lr_ratio: 0.10

# ---- Dataloader ----
num_workers: 8
pin_memory: true
persistent_workers: true

# ---- Caps ----
max_seq_len: 32000
max_pixels: 200000

# ---- Aux Head ----
num_labels: 1
head_input_mode: completion_text_only
hidden_encoder_type: strong_single
# selected_hidden_layer_indices: null

# ---- Regression ----
regression_loss: mse
threshold_for_logging: 0.5


class_weight_strategy: auto
failure_threshold: 0.5
failure_weight: 3.0      # ignored in auto
success_weight: 1.0      # ignored in auto
min_class_weight: 0.1
max_class_weight: 10.0
severity_power: 1.0
use_weighted_sampler: false

failure_weight_multiplier: 1.5
success_weight_multiplier: 1.0

# ---- Logging / Saving ----
log_every: 10
save_every: 1000

# ---- W&B ----
wandb_enabled: true
wandb_project: qwen3vl-aux-head
wandb_entity: null
wandb_run_name: Qwen3VL-2B_instruct_hardmix_120k
